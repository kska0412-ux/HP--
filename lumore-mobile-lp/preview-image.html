<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lu more LP 縦長画像プレビュー</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f7eee8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    main {
      width: min(100%, 430px);
      margin: 0 auto;
      background: #fffaf4;
      box-shadow: 0 18px 50px rgba(76, 51, 41, .16);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      border: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="sr-only">Lu more 天王寺店 スマホLP縦長画像プレビュー</h1>
    <img src="screenshots/lumore-full-preview.png" alt="Lu more 天王寺店のスマホLP縦長プレビュー">
  </main>
</body>
</html>
