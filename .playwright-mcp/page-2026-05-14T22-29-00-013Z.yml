    - generic [ref=e70]:
      - generic [ref=e71]:
        - generic [ref=e72]:
          - text: 骨盤矯正は、出産後どのくらいから
          - text: 始めるのがいいのですか？
        - paragraph [ref=e74]: 普通分娩では1か月以降、帝王切開では２か月以降から始められます。また、早ければ早いほど効果が出やすいので早めの相談をおすすめします。
      - generic [ref=e75]:
        - generic [ref=e76]: 骨盤矯正は何回くらいの施術が必要ですか？
        - paragraph [ref=e78]: 矯正は一度で歪みは取れますが最初のうちは元に戻りやすいのです。年齢や出産回数・目的にもよりますが当院では１０～１５回程度の施術を推奨しております。
      - generic [ref=e79]:
        - generic [ref=e80]: 施術料金はどのくらいですか？
        - generic [ref=e81]:
          - paragraph [ref=e82]: 初回はお試しで2950円です。二回目以降は回数券もございます。産後矯正は目的にもよりますが継続が必要となります。
          - paragraph [ref=e83]: 1回当たりの矯正料金2500円～といったお得な回数券もご用意しております。お客様のニーズにお応えできるプランをご用意させて頂いております。
          - paragraph [ref=e84]: またお支払いしやすい月額サービスもご用意しております。
      - generic [ref=e85]:
        - generic [ref=e86]: 骨盤矯正の時に痛みはありますか？
        - paragraph [ref=e88]: まつい鍼灸整骨院グループの矯正法は沢山あります。痛みが心配な方には痛みがない最善の施術をさせて頂く事が可能ですのでご安心ください。
      - generic [ref=e89]:
        - generic [ref=e90]:
          - text: 骨盤矯正の最適な時期はいつですか？
          - text: 手遅れではないですか？
        - generic [ref=e91]:
          - paragraph [ref=e92]: 産後の骨盤矯正のお客様で一番多いご質問ですが、出産矯正に明確な時期は存在しません。ただ、産後時間の経過と共に効果が出にくくなったり、効果が出るまでの回数が増えてしまう可能性があります。
          - table [ref=e94]:
            - rowgroup [ref=e95]:
              - row "①最も効果が出やすい時期 出産1か月〜産後10か月まで" [ref=e96]:
                - rowheader "①最も効果が出やすい時期" [ref=e97]
                - cell "出産1か月〜産後10か月まで" [ref=e98]
              - row "②効果が見込める時期 産後ダイエットにも効果的な時期 産後11か月〜産後3年半まで" [ref=e99]:
                - rowheader "②効果が見込める時期 産後ダイエットにも効果的な時期" [ref=e100]:
                  - text: ②効果が見込める時期
                  - text: 産後ダイエットにも効果的な時期
                - cell "産後11か月〜産後3年半まで" [ref=e101]
              - row "③効果が出るまでに時間がかかる時期 産後3年半〜" [ref=e102]:
                - rowheader "③効果が出るまでに時間がかかる時期" [ref=e103]
                - cell "産後3年半〜" [ref=e104]
